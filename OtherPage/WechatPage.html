</script></div></div></main><footer id="footer"><div id="time-river"><canvas id="river-canvas"></canvas><div class="river-text"><span>建站天数</span><span id="runtime"></span></div></div><style>#time-river{
  position:relative;
  width:100%;
  height:110px;
  background:#18171D;
  overflow:hidden;
}

#river-canvas{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
}

.river-text{
  position:absolute;
  width:100%;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
  color:#d4af37;
  font-size:12px;
  letter-spacing:5px;
  z-index:2;
  text-shadow:0 0 10px rgba(212,175,55,.8);
}

.river-text span{
  margin:0 12px;
}
</style><script>const canvas=document.getElementById("river-canvas")
const ctx=canvas.getContext("2d")

function resize(){
  canvas.width=window.innerWidth
  canvas.height=110
}

resize()
window.addEventListener("resize",resize)

let t=0
let stars=[]
let particles=[]
let meteors=[]

for(let i=0;i<60;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*1.5
  })
}

for(let i=0;i<90;i++){
  particles.push({
    x:Math.random()*canvas.width,
    speed:Math.random()*0.7+0.2
  })
}

function drawStars(){
  stars.forEach(s=>{
    ctx.beginPath()
    ctx.fillStyle="rgba(255,255,255,.6)"
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
    ctx.fill()
  })
}

function drawRiver(){

  let glow=0.5+Math.sin(t/30)*0.3

  ctx.beginPath()
  ctx.strokeStyle="rgba(212,175,55,"+glow+")"
  ctx.lineWidth=2

  for(let x=0;x<canvas.width;x+=8){
    let y=55+Math.sin((x+t)/70)*10
    ctx.lineTo(x,y)
  }

  ctx.stroke()

}

function drawParticles(){

  particles.forEach(p=>{

    p.x+=p.speed
    if(p.x>canvas.width)p.x=0

    let y=55+Math.sin((p.x+t)/70)*10

    ctx.beginPath()
    ctx.fillStyle="#d4af37"
    ctx.arc(p.x,y,1.4,0,Math.PI*2)
    ctx.fill()

  })

}

function drawConnections(){

  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){

      let dx=particles[i].x-particles[j].x

      if(Math.abs(dx)<60){

        ctx.beginPath()
        ctx.strokeStyle="rgba(212,175,55,.12)"
        ctx.moveTo(particles[i].x,55+Math.sin((particles[i].x+t)/70)*10)
        ctx.lineTo(particles[j].x,55+Math.sin((particles[j].x+t)/70)*10)
        ctx.stroke()

      }

    }
  }

}

function drawMeteor(){

  if(Math.random()<0.02){
    meteors.push({
      x:Math.random()*canvas.width,
      y:0,
      vx:-4,
      vy:4
    })
  }

  meteors.forEach((m,i)=>{

    ctx.beginPath()
    ctx.strokeStyle="rgba(255,215,120,.8)"
    ctx.moveTo(m.x,m.y)
    ctx.lineTo(m.x+20,m.y-20)
    ctx.stroke()

    m.x+=m.vx
    m.y+=m.vy

    if(m.y>canvas.height) meteors.splice(i,1)

  })

}

function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height)

  drawStars()
  drawRiver()
  drawParticles()
  drawConnections()
  drawMeteor()

  t+=1

  requestAnimationFrame(draw)
}

draw()
</script><script>function runtime(){
  const start=new Date("2024-08-20 10:00:00")
  const now=new Date()
  let diff=now-start
  let days=Math.floor(diff/86400000)

  document.getElementById("runtime").innerText=
